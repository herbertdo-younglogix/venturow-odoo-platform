services:

  db:
    image: postgres:15
    container_name: odoo_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo

    volumes:
      - postgres-data:/var/lib/postgresql/data


  odoo:
    image: odoo:19
    container_name: odoo_app

    depends_on:
      - db

    ports:
      - "8069:8069"

    volumes:
      - odoo-data:/var/lib/odoo
      - ./../addons:/mnt/extra-addons
      - ./../config:/etc/odoo


volumes:

 postgres-data:
 odoo-data: